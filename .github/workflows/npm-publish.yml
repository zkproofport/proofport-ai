name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == sdk-v* ]]; then
            echo "package=packages/sdk" >> "$GITHUB_OUTPUT"
            echo "name=@zkproofport-ai/sdk" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == mcp-v* ]]; then
            echo "package=packages/mcp" >> "$GITHUB_OUTPUT"
            echo "name=@zkproofport-ai/mcp" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag: $TAG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Build SDK (always needed)
        run: npx tsc -p packages/sdk

      - name: Build MCP (if publishing MCP)
        if: steps.pkg.outputs.package == 'packages/mcp'
        run: npx tsc -p packages/mcp

      - name: Typecheck
        run: npx tsc -p ${{ steps.pkg.outputs.package }} --noEmit

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.package }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == *"beta"* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
