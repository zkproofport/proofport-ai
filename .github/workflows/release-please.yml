name: Release Please

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'packages/sdk/**'
      - 'packages/mcp/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
