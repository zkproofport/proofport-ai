name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check NPM_TOKEN
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is NOT set"
            exit 1
          else
            echo "NPM_TOKEN is set (${#NPM_TOKEN} chars)"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check RELEASE_PLEASE_TOKEN
        run: |
          if [ -z "$RP_TOKEN" ]; then
            echo "RELEASE_PLEASE_TOKEN is NOT set"
            exit 1
          else
            echo "RELEASE_PLEASE_TOKEN is set (${#RP_TOKEN} chars)"
          fi
        env:
          RP_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
